<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — TKMasters</title>
  <meta name="robots" content="noindex, follow">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png">
  <meta name="theme-color" content="#0B1D3A">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --navy:       #0B1D3A;
      --navy-light: #152B52;
      --red:        #C0151A;
      --red-light:  #E01A20;
      --white:      #FFFFFF;
      --gray:       #9A9A94;
      --font-display: 'Barlow Condensed', sans-serif;
      --font-body:    'Barlow', sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-body);
      background: var(--navy);
      color: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* ── CÍRCULOS DECORATIVOS ── */
    .bg-circles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-circles span {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(192, 21, 26, 0.12);
      animation: pulse 6s ease-in-out infinite;
    }

    .bg-circles span:nth-child(1) { width: 600px; height: 600px; top: -200px; right: -150px; animation-delay: 0s; }
    .bg-circles span:nth-child(2) { width: 420px; height: 420px; top: -80px;  right: -30px;  animation-delay: 0.8s; border-color: rgba(192,21,26,0.18); }
    .bg-circles span:nth-child(3) { width: 240px; height: 240px; top: 40px;   right: 90px;   animation-delay: 1.6s; border-color: rgba(192,21,26,0.22); }
    .bg-circles span:nth-child(4) { width: 500px; height: 500px; bottom: -200px; left: -180px; animation-delay: 2s; }
    .bg-circles span:nth-child(5) { width: 300px; height: 300px; bottom: -80px;  left: -40px;  animation-delay: 2.8s; border-color: rgba(192,21,26,0.16); }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.03); }
    }

    /* ── FAIXA LATERAL ── */
    .side-bar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 5px;
      background: var(--red);
    }

    /* ── CONTEÚDO ── */
    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 40px 24px;
      max-width: 600px;
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── LOGO ── */
    .logo {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      margin-bottom: 56px;
      animation: fadeUp 0.7s ease 0.1s both;
    }

    .logo-text {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 20px;
      letter-spacing: 0.06em;
      color: var(--white);
    }

    .logo-sub {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gray);
    }

    /* ── 404 ── */
    .error-code {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: clamp(120px, 22vw, 180px);
      line-height: 1;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      color: transparent;
      -webkit-text-stroke: 2px rgba(255,255,255,0.08);
      position: relative;
      user-select: none;
      animation: fadeUp 0.7s ease 0.15s both;
    }

    .error-code::after {
      content: '404';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: transparent;
      -webkit-text-stroke: 2px var(--red);
      clip-path: polygon(0 55%, 100% 45%, 100% 100%, 0 100%);
    }

    /* ── MENSAGEM ── */
    .error-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 16px;
      animation: fadeUp 0.7s ease 0.25s both;
    }

    .error-tag::before {
      content: '';
      display: block;
      width: 20px;
      height: 2px;
      background: var(--red);
    }

    .error-title {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: clamp(32px, 5vw, 48px);
      text-transform: uppercase;
      letter-spacing: -0.01em;
      line-height: 1;
      margin-bottom: 16px;
      animation: fadeUp 0.7s ease 0.3s both;
    }

    .error-desc {
      font-size: 16px;
      line-height: 1.7;
      color: rgba(255,255,255,0.5);
      max-width: 420px;
      margin: 0 auto 40px;
      animation: fadeUp 0.7s ease 0.35s both;
    }

    /* ── BOTÕES ── */
    .actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      animation: fadeUp 0.7s ease 0.4s both;
    }

    .btn-primary {
      background: var(--red);
      color: var(--white);
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 13px 32px;
      border-radius: 3px;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
      display: inline-block;
    }

    .btn-primary:hover {
      background: var(--red-light);
      transform: translateY(-2px);
    }

    .btn-outline {
      background: transparent;
      color: rgba(255,255,255,0.7);
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 13px 32px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 3px;
      text-decoration: none;
      transition: all 0.2s;
      display: inline-block;
    }

    .btn-outline:hover {
      border-color: rgba(255,255,255,0.5);
      color: var(--white);
      transform: translateY(-2px);
    }

    /* ── RODAPÉ ── */
    .footer-note {
      position: fixed;
      bottom: 28px;
      left: 0; right: 0;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.04em;
      animation: fadeUp 0.7s ease 0.5s both;
    }

    .footer-note span {
      color: var(--red);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .actions {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <div class="bg-circles">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="side-bar"></div>

  <div class="container">

    <a href="index.html" class="logo">
      <span class="logo-text">TKMASTERS</span>
      <span class="logo-sub">Consultoria e Sistemas</span>
    </a>

    <div class="error-code">404</div>

    <div class="error-tag">Página não encontrada</div>

    <h1 class="error-title">Este endereço<br>não existe.</h1>

    <p class="error-desc">
      O link pode estar errado, a página foi movida
      ou simplesmente nunca existiu por aqui.
    </p>

    <div class="actions">
      <a href="index.html" class="btn-primary">Voltar ao início</a>
      <a href="tkmaster_contato.html" class="btn-outline">Falar com a equipe</a>
    </div>

  </div>

  <p class="footer-note">
    © 2026 <span>TKMaster</span> Consultoria e Sistemas
  </p>

</body>
</html>
